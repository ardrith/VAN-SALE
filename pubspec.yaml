name: van_sale
description: Van Sale Offline Application with Sync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Network & Sync
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
